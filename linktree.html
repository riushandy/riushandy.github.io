<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <title>DBL Indonesia Linktree</title>

    <style>
        body {
            background: #a3a3a4;
            font-family: "DM Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: <weight>;
            font-style: normal;
        }

        .container {
            max-width: 650px;
            margin: auto;
            padding: 40px;
        }

        .main-card {
            background: linear-gradient(#e4e4e4, #b0b0b0);
            padding: 20px;
            border-radius: 20px;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .icon-btn {
            background: white;
            border-radius: 50%;
            padding: 8px;
        }

        .w3-theme-l1 {
            background-color: #ffffff;
            color: black;
            height: 60px;
            align-items: center;
        }

        .w3-theme-l1:hover {
            background-color: #f2f2f2;
        }

        .w3-border {
            border: 1px solid #ddd;
        }

        .links-container a {
            width: 100%;
            margin-bottom: 12px;
        }

        .title {
            font-size: x-large;
            font-weight: bold;
            margin-top: 10px;
            color: white;
        }


        .social {
            text-align: center;
            margin-top: 20px;
        }

        .social i {
            margin: 0 8px;
        }

        .join-btn {
            text-align: center;
            margin-top: 20px;
        }

        .join-btn a {
            background: white;
            padding: 10px 18px;
            border-radius: 25px;
            display: inline-block;
            font-weight: bold;
            margin-top: 65px;
        }

        .icon-btn {
            background: white;
            border-radius: 50%;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-top {
            width: 18px;
            height: 18px;
        }

        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: small;
            color: #777;
        }

        .icon {
            width: 24px;
            height: 24px;
            margin: 0 8px;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="container">

            <div class="top-header">
                <div class="icon-btn">

                <a href="#" class="w3-button w3-round w3-theme-l1 w3-border">
                    Download DBL Play (iOS)

                <img src="assets\img\linktree\instagram.png" class="icon">
                <img src="assets\img\linktree\tiktok.png" class="icon">
                <img src="assets\img\linktree\youtube.png" class="icon">
                <img src="assets\img\linktree\mail.png" class="icon">

            <!-- BUTTON -->
            <div class="join-btn">
